@let controls = formGroup.controls;

<form class="form login" [formGroup]="formGroup">
  <h2>{{ isReg() ? "Регистрация" : "Авторизация" }}</h2>
  @if (isReg()) {
    <div class="form-row"><custom-input [width]="400" label="Имя" [formControl]="controls.name"></custom-input></div>
  }
  <div class="form-row"><custom-input [width]="400" label="Email" [formControl]="controls.email"></custom-input></div>
  <div class="form-row">
    <custom-input [width]="400" label="Пароль" role="password" [formControl]="controls.password"></custom-input>
  </div>
  <div class="form-row">
    <custom-button (buttonClick)="onAuth()">{{ isReg() ? "Зарегистрироваться" : "Войти" }}</custom-button>
  </div>
  <div class="form-row">
    @if (isReg()) {
      <div class="link" (click)="redirectTo('login')">Есть аккаунт? Авторизоваться</div>
    } @else {
      <div class="link" (click)="redirectTo('registration')">Нет аккаунта? Зарегистрироваться</div>
    }
  </div>
</form>
